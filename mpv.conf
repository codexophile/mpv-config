no-border
screen=1
save-position-on-quit
volume=20

osd-font=Victor mono
osd-font-size=35
osd-duration=5000

sub-scale-by-window=no
sub-scale-with-window=no
sub-pos=60
sub-font-size=35
sub-outline-size=1
sub-spacing=3
#sub-ass-vsfilter-aspect-compat=no
#sub-ass-vsfilter-blur-compat=no

vo=gpu
hwdec
# dscale=bilinear
priority=high

force-seekable=yes

[movies_tv]
profile-cond=require 'mp.utils'.join_path(working_directory, path):match('[Cc]:\\media[\\$]') ~= nil
sub-file-paths=subs
sub-auto=all
saturation=30
volume=100

[w]
profile-cond=require 'mp.utils'.join_path(working_directory, path):match('[XxWx]:') ~= nil
loop-file=inf
saturation=0
volume=20

[pause_on_focus_lost]
profile-cond=not focused
profile-restore=copy-equal
pause=yes

[edge-playback]
loop-file=no